<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <script src="adivinhe.js" defer></script>

    <title>Adivinhe o número</title>

  </head>
  <body onload = "iniciar()">
    <main>

      <div id="welcomeScreen">
        <h2>Adivinhe o número. <br />1 - 100</h2>
      </div>

      <div id="gameArea">

        <section>
          <h3 id="informacaoDaJogada">Sua jogada:</h3>
          <input type="number" id="caixaDaJogada" min="1" max="100" onchange = "comparacaoNumeros()"/>
        </section>

        <section class="stats">

          <div class="info">
            <p>Número de tentativas:</p>
            <span id="numeroTentativas"></span> 
          </div>

          <div class="info">
            <p>Suas jogadas:</p>
            <span id="jogadasUsuario"></span>
          </div>

        </section>

        <button id="novoJogoBotao">NOVO JOGO</button>
      </div>
    </main>
    
  </body>
</html>
